name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  MAVEN_OPTS: "-Xmx4g -XX:+UseParallelGC"

jobs:
  galette:
    name: Galette (JDK 17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Cache ~/.m2
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-galette-${{ hashFiles('galette/**/pom.xml') }}
          restore-keys: m2-galette-
      - name: Build Galette
        working-directory: galette
        run: mvn -B -DskipTests install
      - name: Galette IT suite (3675 tests)
        working-directory: galette
        run: mvn -B -pl :galette-integration-tests -am verify
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: galette-agent-jar
          path: galette/galette-agent/target/galette-agent-*.jar
          retention-days: 7

  crochet:
    name: CROCHET (JDK 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Cache ~/.m2
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-crochet-${{ hashFiles('crochet/**/pom.xml') }}
          restore-keys: m2-crochet-
      - name: Build CROCHET
        working-directory: crochet
        run: mvn -B -DskipTests install
      - name: CROCHET agent unit tests (35)
        working-directory: crochet
        run: mvn -B -pl crochet-agent test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crochet-agent-jar
          path: crochet/crochet-agent/target/crochet-agent-*.jar
          retention-days: 7

  knarr:
    name: Knarr + knarr-server + concolic driver (JDK 17)
    runs-on: ubuntu-latest
    needs: [galette, crochet]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Also install JDK 21 (for CROCHET agent-jar build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Switch primary to JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Cache ~/.m2
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-knarr-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-knarr-
      - name: Install Galette to ~/.m2
        working-directory: galette
        run: mvn -B -DskipTests install
      - name: Install CROCHET to ~/.m2 (uses JDK 21)
        run: |
          JAVA_HOME="${JAVA_HOME_21_X64}" "${JAVA_HOME_21_X64}/bin/java" -version
          JAVA_HOME="${JAVA_HOME_21_X64}" mvn -B -f crochet/pom.xml -DskipTests install
      - name: Bootstrap green-solver + Z3 bindings to ~/.m2
        run: bash .github/scripts/bootstrap-local-deps.sh
      - name: Knarr compile + concolic driver structure tests
        run: mvn -B install -DskipTests -DskipITs
      - name: knarr-server Z3 unit tests
        run: mvn -B -pl knarr-server test
      - name: Knarr IT suite (instrumented JDK, Galette + Z3 round-trip)
        run: mvn -B -pl knarr -am verify
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: hs-err-logs
          path: '**/hs_err_pid*.log'
          retention-days: 7
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: knarr-server-logs
          path: |
            knarr/target/knarr-server.out
            knarr/target/knarr-server.err
          retention-days: 7
