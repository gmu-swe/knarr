name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  MAVEN_OPTS: "-Xmx4g -XX:+UseParallelGC"

jobs:
  build-and-test:
    name: Build + Test (JDK 17)
    runs-on: ripley-cloud-linux-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Cache ~/.m2
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-ci-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-ci-
      - name: Bootstrap green-solver + Z3 bindings to ~/.m2
        run: bash .github/scripts/bootstrap-local-deps.sh
      - name: Build all modules
        run: mvn -B install -DskipTests -DskipITs
      - name: knarr-server Z3 unit tests
        run: mvn -B -pl knarr-server test
      - name: Bridge unit tests
        run: mvn -B -pl crochet-galette-bridge test
      - name: Concolic driver structure tests
        run: mvn -B -pl knarr-concolic test
      - name: Knarr IT suite (Galette-instrumented JDK + Z3)
        run: mvn -B -pl knarr -am verify
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ci-logs
          path: |
            **/hs_err_pid*.log
            knarr/target/knarr-server.out
            knarr/target/knarr-server.err
          retention-days: 7
